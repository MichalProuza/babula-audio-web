<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pan Babula – Soundboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d0700;
    --grid:    #1a1008;
    --c1:  #f59e0b;
    --c2:  #ef4444;
    --c3:  #f97316;
    --c4:  #eab308;
    --c5:  #e07b20;
    --c6:  #c84b4b;
    --c7:  #f0a500;
    --c8:  #d97706;
    --c9:  #fbbf24;
    --c10: #dc2626;
    --c11: #ea580c;
    --c12: #ca8a04;
    --c13: #9a3412;
    --c14: #a16207;
    --c15: #c2410c;
    --c16: #b45309;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'Space Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    overflow-x: hidden;
  }

  /* Jemné scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,200,80,0.012) 2px,
      rgba(255,200,80,0.012) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* ── HEADER ─────────────────────────────────── */
  header {
    text-align: center;
    margin-bottom: 52px;
  }

  .badge {
    display: inline-block;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #8a6020;
    border: 1px solid #3a2808;
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 900;
    font-size: clamp(3rem, 8vw, 6rem);
    letter-spacing: -0.03em;
    color: #fff;
    line-height: 0.95;
  }

  h1 .name {
    display: block;
    background: linear-gradient(135deg, #f59e0b 0%, #f97316 50%, #ef4444 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 40px rgba(245,158,11,0.4));
  }

  h1 .prefix {
    display: block;
    font-size: 0.45em;
    letter-spacing: 0.1em;
    color: #5a3c10;
    -webkit-text-fill-color: #5a3c10;
    filter: none;
    margin-bottom: 4px;
  }

  .subtitle {
    margin-top: 14px;
    color: #6b4a18;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #5a3c10, transparent);
    margin: 18px auto 0;
  }

  /* ── GRID ───────────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 720px;
    width: 100%;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  }

  /* ── TILE ───────────────────────────────────── */
  .tile {
    position: relative;
    aspect-ratio: 1;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    overflow: hidden;
    background: var(--grid);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* Barevná vrstva pozadí */
  .tile::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--color);
    opacity: 0.1;
    transition: opacity 0.15s ease;
  }

  /* Rámeček */
  .tile::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 1.5px solid var(--color);
    border-radius: 6px;
    opacity: 0.35;
    transition: opacity 0.15s ease;
  }

  .tile:hover::before { opacity: 0.18; }
  .tile:hover::after  { opacity: 0.9; }

  .tile:hover {
    transform: scale(1.05);
    box-shadow: 0 0 28px -4px var(--color), 0 0 55px -18px var(--color);
  }

  .tile.playing {
    transform: scale(0.96);
    box-shadow: 0 0 50px -4px var(--color), 0 0 90px -8px var(--color) !important;
  }

  .tile.playing::before { opacity: 0.38 !important; }
  .tile.playing::after  { opacity: 1; box-shadow: inset 0 0 18px rgba(0,0,0,0.4); }

  /* Ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: var(--color);
    opacity: 0.3;
    transform: scale(0);
    animation: ripple-anim 0.5s ease-out forwards;
    pointer-events: none;
  }

  @keyframes ripple-anim {
    to { transform: scale(4); opacity: 0; }
  }

  /* Vnitřek dlaždice */
  .tile-inner {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 8px 12px;
  }

  .tile-num {
    position: absolute;
    top: 7px;
    left: 9px;
    font-size: 0.5rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--color);
    opacity: 0.5;
  }

  .tile-icon {
    font-size: 1.9rem;
    filter: drop-shadow(0 0 5px var(--color));
    transition: transform 0.1s ease, filter 0.1s ease;
    line-height: 1;
  }

  .tile:hover .tile-icon {
    transform: scale(1.2);
    filter: drop-shadow(0 0 10px var(--color));
  }

  .tile.playing .tile-icon {
    animation: pulse-icon 0.35s ease;
  }

  @keyframes pulse-icon {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.35); }
    100% { transform: scale(1); }
  }

  /* Waveform animace */
  .wave {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 14px;
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .tile.playing .wave { opacity: 1; }

  .wave span {
    width: 2.5px;
    border-radius: 2px;
    background: var(--color);
    animation: wave-bar 0.55s ease-in-out infinite alternate;
  }
  .wave span:nth-child(1) { height: 6px;  animation-delay: 0s;    }
  .wave span:nth-child(2) { height: 12px; animation-delay: 0.1s;  }
  .wave span:nth-child(3) { height: 14px; animation-delay: 0.05s; }
  .wave span:nth-child(4) { height: 9px;  animation-delay: 0.15s; }
  .wave span:nth-child(5) { height: 12px; animation-delay: 0.08s; }

  @keyframes wave-bar {
    from { transform: scaleY(0.25); }
    to   { transform: scaleY(1); }
  }

  .tile-label {
    font-size: 0.52rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color);
    opacity: 0.8;
    text-align: center;
    font-weight: 700;
    line-height: 1.3;
    max-width: 90%;
  }

  /* ── FOOTER ─────────────────────────────────── */
  footer {
    margin-top: 48px;
    color: #2e1e08;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-align: center;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <p class="badge">Legendární český seriál</p>
  <h1>
    <span class="prefix">Pan</span>
    <span class="name">Babula</span>
  </h1>
  <p class="subtitle">Soundboard &nbsp;·&nbsp; Hospoda</p>
  <div class="divider"></div>
</header>

<div class="grid" id="grid"></div>

<footer>Klikni na dlaždici — přehraje se hlášce &nbsp;·&nbsp; Hospoda © ČT</footer>

<script>
const sounds = [
  { num: '016', file: 'Audio_files/016_chcisiskocit.mp3',        icon: '🏃', label: 'Chci si\nskočit',                  color: 'var(--c1)'  },
  { num: '015', file: 'Audio_files/015_osirelomidite.mp3',       icon: '😢', label: 'Osiřelo\nmi dítě',                 color: 'var(--c2)'  },
  { num: '014', file: 'Audio_files/014_tojeslvovicka.mp3',       icon: '🥃', label: 'To je\nslivovovička,\nmilostpaní', color: 'var(--c3)'  },
  { num: '013', file: 'Audio_files/013_fefrmintska.mp3',         icon: '🌿', label: 'Fefrmintska',                      color: 'var(--c4)'  },
  { num: '012', file: 'Audio_files/012_jo.mp3',                  icon: '👍', label: 'Jo',                               color: 'var(--c5)'  },
  { num: '011', file: 'Audio_files/011_tyuzmasdohrano.mp3',      icon: '💀', label: 'Ty už máš\ndohráno',               color: 'var(--c6)'  },
  { num: '010', file: 'Audio_files/010_napracitonesakne.mp3',    icon: '🚫', label: 'Na práci to\nnešáhne',             color: 'var(--c7)'  },
  { num: '009', file: 'Audio_files/009_pazdrate.mp3',            icon: '🎩', label: 'Pazdráte',                         color: 'var(--c8)'  },
  { num: '008', file: 'Audio_files/008_dohrano.mp3',             icon: '🎬', label: 'Dohráno',                          color: 'var(--c9)'  },
  { num: '007', file: 'Audio_files/007_parpivtenezabije.mp3',    icon: '🍻', label: 'Pár piv tě\nnezabije',             color: 'var(--c10)' },
  { num: '006', file: 'Audio_files/006_petpiv.mp3',              icon: '🍻', label: 'Mařenko, hoď\nnám sem pět piv!',   color: 'var(--c11)' },
  { num: '005', file: 'Audio_files/005_aperetiv.mp3',            icon: '🥃', label: 'Apéritiv',                         color: 'var(--c12)' },
  { num: '004', file: 'Audio_files/004_panbabula.mp3',           icon: '👨', label: 'Pan\nBabula',                      color: 'var(--c13)' },
  { num: '003', file: 'Audio_files/003_jabychsidalpivo.mp3',     icon: '🍺', label: 'Já bych si\ndal … pivo?',          color: 'var(--c14)' },
  { num: '002', file: 'Audio_files/002_ozralejstrilzlivej.mp3',  icon: '🍺', label: 'Ožralej –\nstřízlivej',            color: 'var(--c15)' },
  { num: '001', file: 'Audio_files/001_michanyvajicka.mp3',      icon: '🍳', label: 'Míchaná\nvajíčka',                 color: 'var(--c16)' },
];

let currentAudio = null;
let currentTile  = null;

function stopCurrent() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  if (currentTile) {
    currentTile.classList.remove('playing');
  }
  currentAudio = null;
  currentTile  = null;
}

const grid = document.getElementById('grid');

sounds.forEach((s) => {
  const btn = document.createElement('button');
  btn.className = 'tile';
  btn.style.setProperty('--color', s.color);
  btn.setAttribute('aria-label', s.label.replace('\n', ' '));
  btn.innerHTML = `
    <div class="tile-inner">
      <span class="tile-num">${s.num}</span>
      <div class="tile-icon">${s.icon}</div>
      <div class="wave">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="tile-label">${s.label.replace('\n', '<br>')}</div>
    </div>
  `;

  btn.addEventListener('click', (e) => {
    // Ripple efekt
    const rect = btn.getBoundingClientRect();
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    const size = Math.max(rect.width, rect.height);
    const cx = (e.clientX || rect.left + rect.width / 2) - rect.left - size / 2;
    const cy = (e.clientY || rect.top + rect.height / 2) - rect.top - size / 2;
    ripple.style.cssText = `width:${size}px;height:${size}px;left:${cx}px;top:${cy}px`;
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 520);

    // Pokud kliknu na hrajicí dlaždici → zastavím
    if (currentTile === btn) {
      stopCurrent();
      return;
    }

    stopCurrent();

    // Přehraju nové MP3
    const audio = new Audio(s.file);
    currentAudio = audio;
    currentTile  = btn;
    btn.classList.add('playing');

    audio.play().catch(() => {});

    audio.addEventListener('ended', () => {
      if (currentAudio === audio) {
        btn.classList.remove('playing');
        currentAudio = null;
        currentTile  = null;
      }
    });
  });

  btn.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btn.click(); }
  });

  grid.appendChild(btn);
});

// Animace při načtení
document.querySelectorAll('.tile').forEach((tile, i) => {
  tile.style.opacity = '0';
  tile.style.transform = 'scale(0.82) translateY(18px)';
  tile.style.transition = `opacity 0.4s ease ${i * 0.07}s, transform 0.4s ease ${i * 0.07}s`;
  requestAnimationFrame(() => {
    setTimeout(() => {
      tile.style.opacity = '';
      tile.style.transform = '';
    }, 60 + i * 70);
    setTimeout(() => {
      tile.style.transition = 'transform 0.08s ease, box-shadow 0.08s ease';
    }, 650 + i * 70);
  });
});
</script>
</body>
</html>
