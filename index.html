<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zvukové dlaždice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --grid: #13131a;
    --accent1: #ff3c6e;
    --accent2: #00e5ff;
    --accent3: #ffe600;
    --accent4: #7b2fff;
    --accent5: #ff7c2a;
    --accent6: #00ff9d;
    --accent7: #ff2ef7;
    --accent8: #3af0ff;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'Space Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  /* Subtle scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.015) 2px,
      rgba(255,255,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 900;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    letter-spacing: -0.02em;
    color: #fff;
    line-height: 1;
  }

  h1 span {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 10px;
    color: #444;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    max-width: 700px;
    width: 100%;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }

  .tile {
    position: relative;
    aspect-ratio: 1;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    overflow: hidden;
    background: var(--grid);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  .tile::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--color);
    opacity: 0.12;
    transition: opacity 0.15s ease;
  }

  .tile::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 2px solid var(--color);
    border-radius: 4px;
    opacity: 0.5;
    transition: opacity 0.15s ease;
  }

  .tile:hover::before { opacity: 0.2; }
  .tile:hover::after  { opacity: 1; }

  .tile:hover {
    transform: scale(1.04);
    box-shadow: 0 0 30px -5px var(--color), 0 0 60px -20px var(--color);
  }

  .tile.playing {
    transform: scale(0.95);
    box-shadow: 0 0 50px -5px var(--color), 0 0 100px -10px var(--color) !important;
  }

  .tile.playing::before { opacity: 0.45 !important; }
  .tile.playing::after  { opacity: 1; box-shadow: inset 0 0 20px var(--color); }

  /* Ripple on click */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: var(--color);
    opacity: 0.35;
    transform: scale(0);
    animation: ripple-anim 0.5s ease-out forwards;
    pointer-events: none;
  }

  @keyframes ripple-anim {
    to { transform: scale(4); opacity: 0; }
  }

  .tile-inner {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px;
  }

  .tile-icon {
    font-size: 2rem;
    filter: drop-shadow(0 0 6px var(--color));
    transition: transform 0.1s ease, filter 0.1s ease;
    line-height: 1;
  }

  .tile:hover .tile-icon {
    transform: scale(1.15);
    filter: drop-shadow(0 0 12px var(--color));
  }

  .tile.playing .tile-icon {
    animation: pulse-icon 0.3s ease;
  }

  @keyframes pulse-icon {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .tile-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--color);
    opacity: 0.85;
    text-align: center;
    font-weight: 700;
  }

  /* Waveform bars indicator */
  .wave {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 18px;
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .tile.playing .wave { opacity: 1; }

  .wave span {
    width: 3px;
    border-radius: 2px;
    background: var(--color);
    animation: wave-bar 0.6s ease-in-out infinite alternate;
  }
  .wave span:nth-child(1) { height: 8px;  animation-delay: 0s;    }
  .wave span:nth-child(2) { height: 14px; animation-delay: 0.1s;  }
  .wave span:nth-child(3) { height: 18px; animation-delay: 0.05s; }
  .wave span:nth-child(4) { height: 10px; animation-delay: 0.15s; }
  .wave span:nth-child(5) { height: 16px; animation-delay: 0.08s; }

  @keyframes wave-bar {
    from { transform: scaleY(0.3); }
    to   { transform: scaleY(1); }
  }

  footer {
    margin-top: 48px;
    color: #2a2a35;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>SOUND<span>BOARD</span></h1>
  <p class="subtitle">klikni — hraj — opakuj</p>
</header>

<div class="grid" id="grid"></div>

<footer>WEB AUDIO API &nbsp;·&nbsp; PROCEDURÁLNĚ GENEROVANÉ ZVUKY</footer>

<script>
const AudioContext = window.AudioContext || window.webkitAudioContext;
const ctx = new AudioContext();

// --- Procedural sound generators ---
const sounds = [
  {
    label: 'Kick',
    icon: '🥁',
    color: 'var(--accent1)',
    gen: (ctx) => {
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(0.01, t + 0.5);
      gain.gain.setValueAtTime(1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.start(t); osc.stop(t + 0.5);
    }
  },
  {
    label: 'Snare',
    icon: '🎯',
    color: 'var(--accent2)',
    gen: (ctx) => {
      const t = ctx.currentTime;
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.2, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      filter.type = 'highpass'; filter.frequency.value = 1000;
      src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.8, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      src.start(t); src.stop(t + 0.2);
    }
  },
  {
    label: 'Hi-Hat',
    icon: '🔔',
    color: 'var(--accent3)',
    gen: (ctx) => {
      const t = ctx.currentTime;
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      filter.type = 'highpass'; filter.frequency.value = 7000;
      src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.5, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      src.start(t); src.stop(t + 0.08);
    }
  },
  {
    label: 'Bass',
    icon: '🎸',
    color: 'var(--accent4)',
    gen: (ctx) => {
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sawtooth';
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(80, t);
      gain.gain.setValueAtTime(0.6, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      osc.start(t); osc.stop(t + 0.6);
    }
  },
  {
    label: 'Synth',
    icon: '🎹',
    color: 'var(--accent5)',
    gen: (ctx) => {
      const t = ctx.currentTime;
      [440, 554, 660].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.value = freq;
        osc.connect(gain); gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0.15, t + i * 0.08);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8 + i * 0.08);
        osc.start(t + i * 0.08); osc.stop(t + 1);
      });
    }
  },
  {
    label: 'Bell',
    icon: '🔔',
    color: 'var(--accent6)',
    gen: (ctx) => {
      const t = ctx.currentTime;
      const freqs = [880, 1100, 1320, 1760];
      freqs.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        osc.connect(gain); gain.connect(ctx.destination);
        const vol = 0.3 / (i + 1);
        gain.gain.setValueAtTime(vol, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
        osc.start(t); osc.stop(t + 2.5);
      });
    }
  },
  {
    label: 'Laser',
    icon: '⚡',
    color: 'var(--accent7)',
    gen: (ctx) => {
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sawtooth';
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(1200, t);
      osc.frequency.exponentialRampToValueAtTime(100, t + 0.3);
      gain.gain.setValueAtTime(0.5, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
    }
  },
  {
    label: 'Clap',
    icon: '👏',
    color: 'var(--accent8)',
    gen: (ctx) => {
      [0, 0.02, 0.04].forEach(delay => {
        const t = ctx.currentTime + delay;
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass'; filter.frequency.value = 1200; filter.Q.value = 0.5;
        src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0.6, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        src.start(t); src.stop(t + 0.15);
      });
    }
  }
];

// Build tiles
const grid = document.getElementById('grid');

sounds.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'tile';
  btn.style.setProperty('--color', s.color);
  btn.setAttribute('aria-label', s.label);
  btn.innerHTML = `
    <div class="tile-inner">
      <div class="tile-icon">${s.icon}</div>
      <div class="wave">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="tile-label">${s.label}</div>
    </div>
  `;

  btn.addEventListener('click', (e) => {
    if (ctx.state === 'suspended') ctx.resume();

    // Ripple
    const rect = btn.getBoundingClientRect();
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    const size = Math.max(rect.width, rect.height);
    ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px`;
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);

    // Play
    s.gen(ctx);

    // Visual feedback
    btn.classList.add('playing');
    setTimeout(() => btn.classList.remove('playing'), 400);
  });

  // Keyboard support
  btn.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') btn.click();
  });

  grid.appendChild(btn);
});

// Animate tiles in on load
const tiles = document.querySelectorAll('.tile');
tiles.forEach((tile, i) => {
  tile.style.opacity = '0';
  tile.style.transform = 'scale(0.8) translateY(20px)';
  tile.style.transition = `opacity 0.4s ease ${i * 0.06}s, transform 0.4s ease ${i * 0.06}s, box-shadow 0.08s ease, filter 0.08s ease`;
  requestAnimationFrame(() => {
    setTimeout(() => {
      tile.style.opacity = '';
      tile.style.transform = '';
    }, 50 + i * 60);
    setTimeout(() => {
      tile.style.transition = 'transform 0.08s ease, box-shadow 0.08s ease';
    }, 600 + i * 60);
  });
});
</script>
</body>
</html>
