name: Přidej nové hlášky

on:
  schedule:
    # Každých 72 hodin (každé 3 dny v 6:00 UTC)
    - cron: '0 6 */3 * *'
  workflow_dispatch: # Ruční spuštění

permissions:
  contents: write

jobs:
  add-quotes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Spusť skript pro přidání hlášek
        id: add
        run: python .github/scripts/add_quotes.py

      - name: Commit a push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html Nazvy_hlasek.md
          if git diff --cached --quiet; then
            echo "Žádné změny k commitnutí."
            exit 0
          fi
          git commit -m "Přidány nové hlášky na web (automaticky)"
          git push

      - name: Notifikace e-mailem (dochází hlášky)
        if: steps.add.outputs.remaining_count != '' && fromJSON(steps.add.outputs.remaining_count) <= 8
        env:
          MAIL_FROM: ${{ secrets.NOTIFY_MAIL_FROM }}
          MAIL_TO: ${{ secrets.NOTIFY_MAIL_TO }}
          MAIL_PASSWORD: ${{ secrets.NOTIFY_MAIL_PASSWORD }}
          REMAINING: ${{ steps.add.outputs.remaining_count }}
        run: |
          python - <<'EOF'
          import smtplib, os
          from email.mime.text import MIMEText

          remaining = int(os.environ['REMAINING'])
          batch_size = 4
          batches_left = remaining // batch_size
          days_left = batches_left * 3

          subject = f"⚠️ Babula.cz – dochází hlášky (zbývá {remaining})"
          body = f"""Ahoj!

          Automatický systém babula.cz ti oznamuje, že ve frontě zbývá pouze {remaining} hlášek.

          To jsou přibližně {batches_left} přidání ({days_left} dní).

          Je čas nahrát nové soubory MP3 do složky Audio_files/ v repozitáři!

          -- babula.cz automatická notifikace
          """

          msg = MIMEText(body, 'plain', 'utf-8')
          msg['Subject'] = subject
          msg['From'] = os.environ['MAIL_FROM']
          msg['To'] = os.environ['MAIL_TO']

          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as smtp:
              smtp.login(os.environ['MAIL_FROM'], os.environ['MAIL_PASSWORD'])
              smtp.sendmail(os.environ['MAIL_FROM'], os.environ['MAIL_TO'], msg.as_string())

          print(f"E-mail odeslán na {os.environ['MAIL_TO']}")
          EOF
